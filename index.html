<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="index.js"></script>
    <title>Gubek Veronika</title>
  </head>
  <body>
    <main>
      <header>
        <h1>Híres sakkozók</h1>
      </header>
      <article>
        <table border="1">
          <thead>
            <tr>
              <th><button id="nevNo">↑</button>Név
                <button id="nevCsokk">↓</button></th>
              <th>Nemzetiség</th>
              <th><button id="gyozNo">↑</button>Győzelmek száma<button id="gyozCsokk">↓</button></th>
            </tr>
          </thead>
          <tbody id="tablaadat">

          </tbody>
        </table>
      </article>
      <section>
        <h2>Sakktábla pozíciók</h2>
        <div>
          <label for="pozicio1">1. pozíció:</label>
          <input
            type="text"
            id="pozicio1"
            name="pozicio1"
            placeholder="pl. e4"
          />
        </div>

        <div>
          <label for="pozicio2">2. pozíció:</label>
          <input
            type="text"
            id="pozicio2"
            name="pozicio2"
            placeholder="pl. d5"
          />
        </div>

        <button id="okgomb">OK</button>
      </section>
      <footer>
        <p>&copy; Saját név</p>
      </footer>
    </main>
  </body>
</html>
